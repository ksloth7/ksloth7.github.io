<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Styling Containers Demo</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="shadow">
            <p id="p1">This is a paragraph.</p>
            <p>This is also a paragraph.</p>
        </div>
        <div id="div2" class="shadow border">
            <h2>Heading</h2>
            <p>This is a paragraph within the second container.</p>
        </div>      
        <div class="border">
            <h2>Another Heading</h2>
            <p>This is a paragraph within the third container.</p>
        </div>
    </body>
</html>
